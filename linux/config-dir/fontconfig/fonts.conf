<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <!-- Add Noto Color Emoji as fallback for monospace fonts -->
  <alias>
    <family>JetBrainsMono NF</family>
    <prefer>
      <family>JetBrainsMono NF</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>Victor Mono</family>
    <prefer>
      <family>Victor Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

</fontconfig>
