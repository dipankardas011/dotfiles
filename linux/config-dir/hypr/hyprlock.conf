$font_main = SF Pro Display
$font_mono = SF Mono

general {
    hide_cursor = false
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

animations {
    enabled = true
    bezier = smooth, 0.25, 1, 0.5, 1
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 6, smooth
    animation = fadeOut, 1, 4, smooth
    animation = inputFieldDots, 1, 3, smooth
}

background {
    monitor = 
    path = /home/$USER/.config/hypr/images/everforest/forest_path_trees_mod_everforest.png
    # blur_passes = 1
    # blur_size = 1
}

# Main time display
label {
    monitor = 
    text = cmd[update:1000] date +"%H:%M"
    font_size = 116
    font_family = $font_main
    color = rgba(211, 198, 170, 1)
    
    position = 0, 285
    halign = center
    valign = center
    
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.4)
}

# Date below time
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %-d, %Y"
    font_size = 24
    font_family = $font_main
    color = rgba(211, 198, 170, 1)
    
    position = 0, 178
    halign = center
    valign = center
}

# Floating authentication panel.
shape {
    monitor =
    size = 480, 210
    color = rgba(30, 35, 38, 0.82)
    rounding = 22
    border_size = 1
    border_color = rgba(131, 192, 146, 0.32)

    position = 0, -92
    halign = center
    valign = center
}

# A restrained Everforest accent at the top of the panel.
shape {
    monitor =
    size = 56, 4
    color = rgba(167, 192, 128, 1.0)
    rounding = 2

    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = SECURE SESSION
    font_size = 11
    font_family = $font_mono
    color = rgba(157, 169, 160, 1.0)

    position = 0, -35
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 48
    outline_thickness = 2
    outline_color = rgba(131, 192, 146, 0.55)

    dots_size = 0.25
    dots_spacing = 0.22
    dots_center = true

    # Everforest glass over the forest wallpaper.
    inner_color = rgba(39, 46, 51, 0.78)
    outer_color = rgba(46, 56, 60, 0.9)

    check_color = rgba(167, 192, 128, 1.0)
    fail_color = rgba(230, 126, 128, 1.0)

    font_color = rgba(211, 198, 170, 1.0)
    font_family = $font_main
    font_size = 16

    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = Enter Password
    fail_text = Incorrect Password

    rounding = 12 

    position = 0, -94
    halign = center
    valign = center

    shadow_color = rgba(0, 0, 0, 0.25)
}

# Authentication hint inside the panel.
label {
    monitor =
    text = Enter to unlock
    font_size = 11
    font_family = $font_mono
    color = rgba(157, 169, 160, 1.0)
    
    position = 0, -150
    halign = center
    valign = center
}
